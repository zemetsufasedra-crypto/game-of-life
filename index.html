<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Évolution</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #hud { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; z-index: 5; }
        #start-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); color: white; z-index: 10; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 1.2rem; border: none; border-radius: 5px; transition: 0.3s; }
        #btn-herbivore { background: #00ffcc; }
        #btn-carnivore { background: #ff1e56; color: white; }
        button:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="hud">
        <div>Taille: <span id="size">10</span></div>
        <div>Population: <span id="population">0</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>

    <div id="start-menu">
        <h1>ÉVOLUTION</h1>
        <p>Choisis ta lignée biologique :</p>
        <button id="btn-herbivore">HERBIVORE (Magnétisme)</button>
        <button id="btn-carnivore">CARNIVORE (Combat)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
