<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cellule Évolutive - Bioluminescence</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@latest/dist/pixi-filters.js"></script>
</head>
<body>

    <div id="game-container"></div>
    
    <div class="hud">
        <div class="stat"><span>Taille:</span> <span id="size">15</span></div>
        <div class="stat"><span>FPS:</span> <span id="fps">60</span></div>
    </div>

    <div class="controls">
        <button id="restartBtn" class="btn-game">🔄 Recommencer</button>
        <button id="pauseBtn" class="btn-game">⏸️ Pause</button>
    </div>

    <div id="mutationModal" class="modal hidden">
        <div class="modal-content">
            <h2>⚡ Évolution Atteinte</h2>
            <div class="mutation-choices" id="mutationChoices"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
