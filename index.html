<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spore Evolution - Stage Cellulaire</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@latest/dist/pixi-filters.js"></script>
</head>
<body>

    <div id="game-container"></div>
    
    <div class="hud">
        <div class="stat"><span>Diamètre :</span> <span id=\"size\">15</span>px</div>
        <div class="stat"><span>Temps :</span> <span id=\"age\">0</span>s</div>
        <div class="stat"><span>Faune :</span> <span id=\"population\">0</span></div>
    </div>

    <div class="controls">
        <button id="evolveBtn" class="btn-game" style="display: none; border-color: #ffd700; color: #ffd700;">⚡ Mutation Dispo</button>
        <button id="viewTreeBtn" class="btn-game">🌳 Arbre Génétique</button>
        <button id="restartBtn" class="btn-game">🔄 Réinitialiser</button>
    </div>

    <div id="dietModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #fff; margin-bottom: 15px;">🧬 Origine de la Lignée</h2>
            <p style="color: #aaa; font-size: 13px; margin-bottom: 25px;">
                Sélectionnez le métabolisme de votre micro-organisme pour commencer son cycle d'évolution.
            </p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="btn-herbivore" class="btn-game" style="border-color: #00ffd2; color: #00ffd2; padding: 12px 24px;">🟢 Herbivore</button>
                <button id="btn-carnivore" class="btn-game" style="border-color: #ff1e56; color: #ff1e56; padding: 12px 24px;">🔴 Carnivore</button>
            </div>
        </div>
    </div>

    <div id="mutationModal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <h2 style="color: #ffd700; margin-bottom: 5px;">⚡ Laboratoire Génétique</h2>
            <p style="color: #888; font-size: 12px; margin-bottom: 15px;">
                Brins d'ADN disponibles : <span id="shop-dna" style="color: #ffd700; font-weight: bold;">0</span>
            </p>
            
            <div id="mutationChoices" style="margin-bottom: 20px;"></div>
            
            <button id="closeShopBtn" class="btn-game" style="width: 100%;">Retourner au milieu aqueux</button>
        </div>
    </div>

    <div id="treeModal" class="modal hidden">
        <div class="modal-content" style="max-width: 550px;">
            <h2 style="color: #00ffd2; margin-bottom: 15px;">🌳 Arbre Phylogénétique</h2>
            
            <div id="treeDisplay" style="max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-right: 5px;"></div>
            
            <button id="closeTreeBtn" class="btn-game" style="width: 100%;">Fermer les archives</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
